<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wordly</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400..700&family=Lobster+Two:ital,wght@0,400;0,700;1,400;1,700&display=swap"
     rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=text_to_speech" />
    <link rel="shortcut icon" href="#">

</head>
<body>
    <header>
        <h3>Wordly</h3>
        <div class="navigation">
            <nav>
                <ul>
                    <li><a href="#">Home</a></li>
                    <li><a href="#definition">Word Search</a></li>
                    <li><a href="#history">History</a></li>
                </ul>
                
            </nav>
        </div>
    </header>
    <section class="word-search">
        
        <audio id="text-to-speech"></audio>
        <div id="search-bar" class="container">
            <h1>Word Dictionary</h1>
            <div class="search-space">
                <form class="search-button">
                    <div class="search-div">
                        <div>
                            <input type="text" id="search-store" placeholder="Search" required/>
                            
                        </div>                    
                        <div>
                            <button id="s-btn">Search</button>
                        </div>
                    </div>                       
                </form>                
            </div>
        <div id= "definition" class="definition"> 

        </div>
            
        </div>
    
    </section>
    <section id="history" class="history">
        <div class="history-div">
            <div id="display-histroy"> 
                <div>
                    <h2></h2>
                    
                </div>                
                <div class="word-highlight" id="word-highlight">
                    <h5>Word of the day:</h5>
                    <button id="word-today">Get new word</button>
                </div>
            </div>
        
            <div>
                <ul id="history-list"></ul>
                <button id="clear-history">Clear History</button>
            </div>
            
        </div>
        
    </section>

    <footer>
        <p>@ 2026 Wordly. All Rights Reserved</p>
        <p>WWW.Wordly Word Search.com</p>
    </footer>

    <script src="index.js"></script>
</body>
</html>
