<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wordly</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400..700&family=Lobster+Two:ital,wght@0,400;0,700;1,400;1,700&display=swap"
     rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=text_to_speech" />
</head>
<body>
    <header>
        <h3>Wordly</h3>
        <div class="navigation">
            <nav>
                <ul>
                    <li><a href="#">Home</a></li>
                    <li><a href="#definition">Word Search</a></li>
                    <li><a href="#">About</a></li>
                </ul>
                
            </nav>
        </div>
    </header>
    <section class="word-search">
        <audio id="tex-to-speech"></audio>
        <div id="search-bar" class="container">
            <div class="search-space">
                <form class="search-button">
                    <input type="text" placeholder="Search" id="search-store", required/>
                    <button id="s-btn">Search</button>
                </form>                
            </div>


        </div>
    
    </section>
    <section id="history" class="history">
        <div>
            <button id="clearButton">Clear History</button>
        </div>
    </section>
    <footer>
        <p>@ 2026 Wordly. All Rights Reserved</p>
        <p>WWW.Wordly Word Search.com</p>
    </footer>

    <script src="index.js"></script>
</body>
</html>
